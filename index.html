<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <script src="js/functions.js" defer></script>
    <title>Glosé MX</title>
</head>
<body>
    <header class="header">
        <img class="header__icon" src="img/icons/menu.svg" alt="Menu">
        <img class="header__logo" src="img/components/logo_glose.png" alt="Logo Glose" >
        <img class="header__icon" src="img/icons/cart.svg" alt="Cart">
    </header>
    <main>
        <section class="banner">
            <h1 class="banner__title">Soft beauty, elevated.</h1>
            <p class="banner__subtitle">Makeup & selfcare essentials</p>
        </section>
        <section class="categories">
            <div class="categories__track">
                <article class="categories__card">
                    <img class="categories__card__img" src="img/components/makeup.png" alt="Makeup">
                    <h2 class="categories__card__title">Makeup</h2>
                </article>
                <article class="categories__card">
                    <img class="categories__card__img" src="img/components/skincare.png" alt="Skincare">
                    <h2 class="categories__card__title">Skincare</h2>
                </article>
                <article class="categories__card">
                    <img class="categories__card__img" src="img/components/lips.png" alt="Lips">
                    <h2 class="categories__card__title">Lips</h2>
                </article>
                <article class="categories__card">
                    <img class="categories__card__img" src="img/components/selfcare.png" alt="Selfcare">
                    <h2 class="categories__card__title">Selfcare</h2>
                </article>
            </div>
        </section>

    </main>
    <footer>

    </footer>
</body>
</html>
